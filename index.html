<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gent Waterways</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout-container">

    <!-- Left: toggle buttons -->
    <div class="buttons-container" id="buttons-container"></div>

    <!-- Centre: map -->
    <div class="map-container" id="map-container">
        <img src="layer0.png" alt="Background Map" class="map-image">
    </div>

    <!-- Right: tooltip panel -->
    <div class="tooltip-container">
        <div class="tooltip-text" id="tooltip-panel"></div>
    </div>

</div>

<script src="data.js"></script>
<script>

    function buildUI() {
        const buttonsContainer = document.getElementById('buttons-container');
        const mapContainer     = document.getElementById('map-container');
        const tooltipPanel     = document.getElementById('tooltip-panel');

        waterways.forEach(w => {

            // --- Button ---
            const btn = document.createElement('button');
            btn.className = 'toggle-button';
            btn.id = `button${w.id}`;
            btn.textContent = w.name;
            btn.addEventListener('click', () => toggleLayer(w.id));
            buttonsContainer.appendChild(btn);

            // --- Image layer ---
            const img = document.createElement('img');
            img.src = w.image;
            img.alt = w.name;
            img.id = `layer${w.id}`;
            img.className = 'layer-image';
            mapContainer.appendChild(img);

            // --- Tooltip block ---
            const div = document.createElement('div');
            div.id = `tooltip${w.id}`;
            div.className = 'tooltip-content';
            div.innerHTML = buildTooltipHTML(w);
            tooltipPanel.appendChild(div);
        });
    }

    function buildTooltipHTML(w) {
        let html = `<div class="tooltip-title">${w.name}</div>`;
        html += `<div class="tooltip-body">${w.description}</div>`;

        if (w.sections) {
            html += `<br><div class="tooltip-body">${w.sections}</div>`;
        }

        if (w.details.length > 0) {
            html += `<ol>`;
            w.details.forEach(d => { html += `<li>${d}</li>`; });
            html += `</ol>`;
        }

        if (w.notes.length > 0) {
            html += `<ul>`;
            w.notes.forEach(n => { html += `<li>${n}</li>`; });
            html += `</ul>`;
        }

        return html;
    }

    function toggleLayer(id) {
        document.getElementById(`layer${id}`).classList.toggle('active');
        document.getElementById(`button${id}`).classList.toggle('active');
        document.getElementById(`tooltip${id}`).classList.toggle('active');
    }

    buildUI();

</script>
</body>
</html>
